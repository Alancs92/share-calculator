<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Share Calculator</title>
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 16 16%22><text y=%2213%22 font-size=%2214%22>🧮</text></svg>"
    />
    <link rel="stylesheet" href="/src/style.css" />
    <script>
      // Applied before first paint to avoid a flash of the wrong theme; kept in
      // sync with theme.ts's THEME_STORAGE_KEY / resolveInitialTheme logic.
      (function () {
        try {
          var stored = localStorage.getItem('share-calculator:theme');
          var theme =
            stored === 'light' || stored === 'dark'
              ? stored
              : window.matchMedia('(prefers-color-scheme: dark)').matches
                ? 'dark'
                : 'light';
          document.documentElement.setAttribute('data-theme', theme);
        } catch (e) {
          /* localStorage unavailable — CSS media query fallback still applies */
        }
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
